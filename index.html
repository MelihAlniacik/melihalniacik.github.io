<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru Hazırlama Platformu</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- html2pdf.bundle.min.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="app-header">
        <h1><i class="fas fa-layer-group"></i> SoruPDF Üretici</h1>
        <p>Hızlı ve şık soru kitapçıkları oluşturun</p>
    </header>

    <main class="container">
        <section class="glass-panel form-section">
            <div class="panel-header">
                <h2><i class="fas fa-pen-nib"></i> Yeni Soru Ekle</h2>
            </div>
            
            <div class="form-group">
                <label for="q-text">Soru Metni</label>
                <textarea id="q-text" rows="4" placeholder="Sorunuzu buraya yazın..."></textarea>
            </div>

            <div class="form-group">
                <label for="q-image" class="file-upload-label">
                    <span class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></span>
                    <span class="upload-text">Görsel Yükle (İsteğe Bağlı)</span>
                    <input type="file" id="q-image" accept="image/*" class="file-input">
                </label>
                <div id="image-preview" class="image-preview-container hidden">
                    <img id="preview-img" src="" alt="Önizleme">
                    <button class="remove-img-btn" id="remove-img" title="Görseli Kaldır"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <div class="form-group options-group">
                <div class="options-header">
                    <label>Şıklar</label>
                    <button id="add-option-btn" class="icon-btn" title="Şık Ekle"><i class="fas fa-plus-circle"></i></button>
                </div>
                <div id="options-container">
                    <!-- Default options A, B, C, D will be injected via JS -->
                </div>
            </div>

            <button id="add-q-btn" class="primary-btn">
                <span>Soruyu Listeye Ekle</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </section>

        <section class="glass-panel preview-section">
            <div class="panel-header">
                <h2><i class="fas fa-list-ol"></i> Eklenen Sorular (<span id="q-count">0</span>)</h2>
                <button id="export-pdf-btn" class="action-btn" disabled>
                    <i class="fas fa-file-pdf"></i>
                    <span>PDF İndir</span>
                </button>
            </div>
            
            <div id="questions-list" class="questions-list">
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>Henüz soru eklenmedi.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- This container is visually hidden but used for generating the clean PDF -->
    <div id="pdf-render-container" class="pdf-container"></div>

    <script src="app.js"></script>
</body>
</html>
